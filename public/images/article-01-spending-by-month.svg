<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 150" role="img" aria-labelledby="title desc">
  <title id="title">A year of spending, by month (example)</title>
  <desc id="desc">An example of one person's spending across a year. Most months sit near the monthly average. Spending spikes in July for a vacation and again in November and December for the holidays, showing costs a single month would miss.</desc>
  <line x1="14" y1="120" x2="494" y2="120" stroke="#e0e0d8"/>
  <rect x="14"  y="54" width="26" height="66" rx="4" fill="#d7e4dd"/>
  <rect x="54"  y="55" width="26" height="65" rx="4" fill="#d7e4dd"/>
  <rect x="94"  y="52" width="26" height="68" rx="4" fill="#d7e4dd"/>
  <rect x="134" y="55" width="26" height="65" rx="4" fill="#d7e4dd"/>
  <rect x="174" y="53" width="26" height="67" rx="4" fill="#d7e4dd"/>
  <rect x="214" y="48" width="26" height="72" rx="4" fill="#d7e4dd"/>
  <rect x="254" y="35" width="26" height="85" rx="4" fill="#2a5c45"/>
  <rect x="294" y="53" width="26" height="67" rx="4" fill="#d7e4dd"/>
  <rect x="334" y="53" width="26" height="67" rx="4" fill="#d7e4dd"/>
  <rect x="374" y="52" width="26" height="68" rx="4" fill="#d7e4dd"/>
  <rect x="414" y="38" width="26" height="82" rx="4" fill="#2a5c45"/>
  <rect x="454" y="28" width="26" height="92" rx="4" fill="#2a5c45"/>
  <line x1="14" y1="48" x2="476" y2="48" stroke="#6b7670" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="14" y="42" font-family="Georgia, serif" font-size="11" fill="#33414a" text-anchor="start">monthly average</text>
  <text x="267" y="30" font-family="system-ui, sans-serif" font-size="11" fill="#2a5c45" text-anchor="middle">vacation</text>
  <text x="447" y="20" font-family="system-ui, sans-serif" font-size="11" fill="#2a5c45" text-anchor="middle">holidays</text>
  <g font-family="system-ui, sans-serif" font-size="11" fill="#8a948e" text-anchor="middle">
    <text x="27" y="138">J</text>
    <text x="67" y="138">F</text>
    <text x="107" y="138">M</text>
    <text x="147" y="138">A</text>
    <text x="187" y="138">M</text>
    <text x="227" y="138">J</text>
    <text x="267" y="138">J</text>
    <text x="307" y="138">A</text>
    <text x="347" y="138">S</text>
    <text x="387" y="138">O</text>
    <text x="427" y="138">N</text>
    <text x="467" y="138">D</text>
  </g>
</svg>
